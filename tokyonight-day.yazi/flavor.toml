# : Manager {{{

[mgr]
cwd = { fg = "#6172b0" }

# Find
find_keyword  = { fg = "#d0d5e3", bold = true, italic = true, underline = true }
find_position = { fg = "#07879d", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#587539", bg = "#587539" }
marker_cut      = { fg = "#f52a65", bg = "#f52a65" }
marker_marked   = { fg = "#9854f1", bg = "#9854f1" }
marker_selected = { fg = "#2e7de9", bg = "#2e7de9" }

# Count
count_copied   = { fg = "#d0d5e3", bg = "#587539" }
count_cut      = { fg = "#d0d5e3", bg = "#f52a65" }
count_selected = { fg = "#d0d5e3", bg = "#2e7de9" }

# Border
border_symbol = "│"
border_style  = { fg = "#4094a3" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#b4b5b9", bg = "#2e7de9", bold = true }
inactive = { fg = "#2e7de9", bg = "#a8aecb" }

# Separators
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { fg = "#15161e", bg = "#7aa2f7" }
normal_alt  = { fg = "#7aa2f7", bg = "#3b4261" }

# Select mode
select_main = { fg = "#15161e", bg = "#bb9af7" }
select_alt  = { fg = "#bb9af7", bg = "#3b4261" }

# Unset mode
unset_main = { fg = "#15161e", bg = "#9ece6a" }
unset_alt  = { fg = "#9ece6a", bg = "#3b4261" }

# : }}}


# : Indicator of hovered file {{{

[indicator]
padding = { open = "█", close = "█" }

# : }}}


# : Status bar {{{

[status]
overall   = { fg = "#3760bf", bg = "#d0d5e3" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label  = { fg = "#3760bf", bold = true }
progress_normal = { fg = "#7890dd", bg = "#c4c8da" }
progress_error  = { fg = "#c64343", bg = "#c4c8da" }

# Permissions
perm_sep   = { fg = "#a1a6c5" }
perm_type  = { fg = "#2e7de9" }
perm_read  = { fg = "#8c6c3e" }
perm_write = { fg = "#f52a65" }
perm_exec  = { fg = "#587539" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#4094a3" }
active   = { fg = "#3760bf",  bg = "#b7c1e3" }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#07879d" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#07879d" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#4094a3" }
title   = { fg = "#4094a3" }
hovered = { fg = "#3760bf", underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#d0d5e3" }
cand            = { fg = "#007197" }
rest            = { fg = "#2e7de9" }
desc            = { fg = "#9854f1" }
separator       = "  "
separator_style = { fg = "#848cb5" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#587539" }
run     = { fg = "#9854f1" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#3760bf", bg = "#e1e2e7" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#4094a3" }
title    = { fg = "#4094a3" }
tbl_col  = { fg = "#94c95b" }
tbl_cell = { fg = "#5511d5", bg = "#bdc2d6" }


# : }}}


# : Notify {{{

[notify]
title_info  = { fg = "#07879d" }
title_warn  = { fg = "#8c6c3e" }
title_error = { fg = "#c64343" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#e0af68" },

	# Media
	{ mime = "video/*", fg = "#f7768e" },
	{ mime = "audio/*", fg = "#f7768e" },

	# Archives
	{ mime = "application/zip",             fg = "#bb9af7" },
	{ mime = "application/x-tar",           fg = "#bb9af7" },
	{ mime = "application/x-bzip*",         fg = "#bb9af7" },
	{ mime = "application/x-bzip2",         fg = "#bb9af7" },
	{ mime = "application/x-7z-compressed", fg = "#bb9af7" },
	{ mime = "application/x-rar",           fg = "#bb9af7" },
	{ mime = "application/x-xz",            fg = "#bb9af7" },

	# Documents
	{ mime = "application/doc",        fg = "#9ece6a" },
	{ mime = "application/epub+zip",   fg = "#9ece6a" },
	{ mime = "application/pdf",        fg = "#9ece6a" },
	{ mime = "application/rtf",        fg = "#9ece6a" },
	{ mime = "application/vnd.*",      fg = "#9ece6a" },

  # Special files
  { mime = "*", is = "orphan", fg = "#f29cb4", bg = "#93000a" },
  { mime = "application/*exec*", fg = "#f7768e" },

	# Fallback
	{ url = "*", fg = "#6172b0" },
	{ url = "*/", fg = "#3e85e7" },
]

# : }}}
